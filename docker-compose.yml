services:
  reviewer:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      # Mount your GitHub App private key
      - ./private-key.pem:/app/private-key.pem:ro
    environment:
      - GITHUB_PRIVATE_KEY_PATH=/app/private-key.pem
    restart: unless-stopped
